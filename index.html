<!DOCTYPE html><html><head><meta charset="utf-8"><title>Library</title>
<link rel="stylesheet" href="style.css"></head><body>
<h1>📚 Library</h1>
<table id="tbl"><thead><tr><th>Title</th><th>Author</th><th>Available</th></tr></thead><tbody></tbody></table>
<script>
fetch("books.json").then(r=>r.json()).then(data=>{
const tb=document.querySelector("#tbl tbody");
data.forEach(b=>{
tb.innerHTML+=`<tr><td>${b.Title}</td><td>${b.Author}</td><td>${b.Available?"✅":"❌"}</td></tr>`;
});
});
</script></body></html>
